<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HashLab - 哈希计算器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;}
.app{max-width:900px;margin:0 auto;padding:20px;}
.header{text-align:center;margin-bottom:24px;}
.header h1{font-size:1.5em;} .header h1 span{color:#fb923c;}
.card{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px;}
.card h2{font-size:14px;margin-bottom:12px;color:#94a3b8;}
.drop-zone{border:2px dashed #334155;border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all 0.2s;min-height:150px;}
.drop-zone:hover{border-color:#fb923c;}
.drop-zone.dragover{border-color:#fb923c;background:#1a2a1a;}
.drop-zone .icon{font-size:3em;margin-bottom:10px;}
textarea{width:100%;min-height:150px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;padding:12px;font-family:'Courier New',monospace;font-size:13px;resize:vertical;}
textarea:focus{outline:none;border-color:#fb923c;}
.btn{padding:12px 24px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:all 0.2s;}
.btn-primary{background:#fb923c;color:#000;}
.btn-primary:hover{background:#ea580c;}
.btn-secondary{background:#334155;color:#e2e8f0;}
.btn-secondary:hover{background:#475569;}
.results{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;}
.result-item{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px;}
.result-item .algo{font-size:12px;color:#64748b;margin-bottom:6px;}
.result-item .hash{font-family:'Courier New',monospace;font-size:12px;word-break:break-all;color:#fb923c;min-height:24px;}
.result-item .copy{background:none;border:none;color:#64748b;cursor:pointer;float:right;font-size:14px;}
.result-item .copy:hover{color:#fb923c;}
.file-info{background:#0f172a;border-radius:8px;padding:12px;margin-bottom:12px;font-size:13px;}
.file-info .name{color:#fb923c;word-break:break-all;}
.file-info .size{color:#64748b;margin-top:4px;}
</style>
</head>
<body>
<div class="app">
  <div class="header"><h1><span>Hash</span>Lab</h1></div>
  
  <div class="card">
    <h2>输入文本</h2>
    <textarea id="text-input" placeholder="输入文本计算哈希...">Hello, 世界!</textarea>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-primary" onclick="hashText()">计算</button>
      <button class="btn btn-secondary" onclick="clearText()">清空</button>
    </div>
  </div>
  
  <div class="card">
    <h2>或拖拽文件</h2>
    <div class="drop-zone" id="drop-zone">
      <div class="icon">📁</div>
      <p>拖拽文件到此处计算哈希</p>
      <input type="file" id="file-input" style="display:none" onchange="hashFile(this.files[0])">
    </div>
    <div class="file-info" id="file-info" style="display:none">
      <div class="name" id="file-name"></div>
      <div class="size" id="file-size"></div>
    </div>
  </div>
  
  <div class="card">
    <h2>哈希结果</h2>
    <div class="results" id="results"></div>
  </div>
</div>

<script>
const dropZone = document.getElementById('drop-zone');
const textInput = document.getElementById('text-input');

dropZone.addEventListener('click', () => document.getElementById('file-input').click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) hashFile(e.dataTransfer.files[0]);
});

function clearText() {
  textInput.value = '';
  document.getElementById('results').innerHTML = '';
}

async function hashText() {
  const text = textInput.value;
  if (!text) return;
  
  const enc = new TextEncoder();
  const data = enc.encode(text);
  
  const hashes = await Promise.all([
    computeHash(data, 'SHA-1'),
    computeHash(data, 'SHA-256'),
    computeHash(data, 'SHA-384'),
    computeHash(data, 'SHA-512'),
    md5(text)
  ]);
  
  renderResults(hashes);
}

async function hashFile(file) {
  if (!file) return;
  
  document.getElementById('file-info').style.display = 'block';
  document.getElementById('file-name').textContent = file.name;
  document.getElementById('file-size').textContent = formatSize(file.size);
  
  const buffer = await file.arrayBuffer();
  const data = new Uint8Array(buffer);
  
  const hashes = await Promise.all([
    computeHash(data, 'SHA-1'),
    computeHash(data, 'SHA-256'),
    computeHash(data, 'SHA-384'),
    computeHash(data, 'SHA-512'),
    md5Array(data)
  ]);
  
  renderResults(hashes);
}

async function computeHash(data, algo) {
  const hash = await crypto.subtle.digest(algo, data);
  return {
    algo,
    hash: Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('')
  };
}

// MD5 implementation
async function md5(text) {
  const bytes = new TextEncoder().encode(text);
  return { algo: 'MD5', hash: await md5String(text) };
}

async function md5String(str) {
  function safeAdd(x, y) {
    const lsw = (x & 0xffff) + (y & 0xffff);
    const msw = (x >> 16) + (y >> 16) + (lsw >> 16);
    return (msw << 16) | (lsw & 0xffff);
  }
  
  function bitRotateLeft(num, cnt) {
    return (num << cnt) | (num >>> (32 - cnt));
  }
  
  function md5cmn(q, a, b, x, s, t) {
    return safeAdd(bitRotateLeft(safeAdd(safeAdd(a, q), safeAdd(x, t)), s), b);
  }
  
  function md5ff(a, b, c, d, x, s, t) {
    return md5cmn((b & c) | (~b & d), a, b, x, s, t);
  }
  
  function md5gg(a, b, c, d, x, s, t) {
    return md5cmn((b & d) | (c & ~d), a, b, x, s, t);
  }
  
  function md5hh(a, b, c, d, x, s, t) {
    return md5cmn(b ^ c ^ d, a, b, x, s, t);
  }
  
  function md5ii(a, b, c, d, x, s, t) {
    return md5cmn(c ^ (b | ~d), a, b, x, s, t);
  }
  
  const utf8str = unescape(encodeURIComponent(str));
  const x = [];
  for (let i = 0; i < utf8str.length; i++) {
    x[i] = utf8str.charCodeAt(i);
  }
  
  x[str.length >> 2] |= 0x80 << (str.length % 4 << 3);
  x[(str.length + 8) >> 2] = str.length;
  
  let a = 1732584193, b = -271733879, c = -1732584194, d = 271733878;
  
  for (let i = 0; i < x.length; i += 16) {
    const olda = a, oldb = b, oldc = c, oldd = d;
    
    a = md5ff(a, b, c, d, x[i], 7, -680876936);
    d = md5ff(d, a, b, c, x[i + 1], 12, -389564586);
    c = md5ff(c, d, a, b, x[i + 2], 17, 606105819);
    b = md5ff(b, c, d, a, x[i + 3], 22, -1044525330);
    a = md5ff(a, b, c, d, x[i + 4], 7, -176418897);
    d = md5ff(d, a, b, c, x[i + 5], 12, 1200080426);
    c = md5ff(c, d, a, b, x[i + 6], 17, -1473231341);
    b = md5ff(b, c, d, a, x[i + 7], 22, -45705983);
    a = md5ff(a, b, c, d, x[i + 8], 7, 1770035416);
    d = md5ff(d, a, b, c, x[i + 9], 12, -1958414417);
    c = md5ff(c, d, a, b, x[i + 10], 17, -42063);
    b = md5ff(b, c, d, a, x[i + 11], 22, -1990404162);
    a = md5ff(a, b, c, d, x[i + 12], 7, 1804603682);
    d = md5ff(d, a, b, c, x[i + 13], 12, -40341101);
    c = md5ff(c, d, a, b, x[i + 14], 17, -1502002290);
    b = md5ff(b, c, d, a, x[i + 15], 22, 1236535329);
    
    a = md5gg(a, b, c, d, x[i + 1], 5, -165796510);
    d = md5gg(d, a, b, c, x[i + 6], 9, -1069501632);
    c = md5gg(c, d, a, b, x[i + 11], 14, 643717713);
    b = md5gg(b, c, d, a, x[i], 20, -373897302);
    a = md5gg(a, b, c, d, x[i + 5], 5, -701558691);
    d = md5gg(d, a, b, c, x[i + 10], 9, 38016083);
    c = md5gg(c, d, a, b, x[i + 15], 14, -660478335);
    b = md5gg(b, c, d, a, x[i + 4], 20, -405537848);
    a = md5gg(a, b, c, d, x[i + 9], 5, 568446438);
    d = md5gg(d, a, b, c, x[i + 14], 9, -1019803690);
    c = md5gg(c, d, a, b, x[i + 3], 14, -187363961);
    b = md5gg(b, c, d, a, x[i + 8], 20, 1163531501);
    a = md5gg(a, b, c, d, x[i + 13], 5, -1444681467);
    d = md5gg(d, a, b, c, x[i + 2], 9, -51403784);
    c = md5gg(c, d, a, b, x[i + 7], 14, 1735328473);
    b = md5gg(b, c, d, a, x[i + 12], 20, -1926607734);
    
    a = md5hh(a, b, c, d, x[i + 5], 4, -378558);
    d = md5hh(d, a, b, c, x[i + 8], 11, -2022574463);
    c = md5hh(c, d, a, b, x[i + 11], 16, 1839030562);
    b = md5hh(b, c, d, a, x[i + 14], 23, -35309556);
    a = md5hh(a, b, c, d, x[i + 1], 4, -1530992060);
    d = md5hh(d, a, b, c, x[i + 4], 11, 1272893353);
    c = md5hh(c, d, a, b, x[i + 7], 16, -155497632);
    b = md5hh(b, c, d, a, x[i + 10], 23, -1094730640);
    a = md5hh(a, b, c, d, x[i + 13], 4, 681279174);
    d = md5hh(d, a, b, c, x[i + 0], 11, -358537222);
    c = md5hh(c, d, a, b, x[i + 3], 16, -722521979);
    b = md5hh(b, c, d, a, x[i + 6], 23, 76029189);
    a = md5hh(a, b, c, d, x[i + 9], 4, -640364487);
    d = md5hh(d, a, b, c, x[i + 12], 11, -421815835);
    c = md5hh(c, d, a, b, x[i + 15], 16, 530742520);
    b = md5hh(b, c, d, a, x[i + 2], 23, -995338651);
    
    a = md5ii(a, b, c, d, x[i], 6, -198630844);
    d = md5ii(d, a, b, c, x[i + 7], 10, 1126891415);
    c = md5ii(c, d, a, b, x[i + 14], 15, -1416354905);
    b = md5ii(b, c, d, a, x[i + 5], 21, -57434055);
    a = md5ii(a, b, c, d, x[i + 12], 6, 1700485571);
    d = md5ii(d, a, b, c, x[i + 3], 10, -1894986606);
    c = md5ii(c, d, a, b, x[i + 10], 15, -1051523);
    b = md5ii(b, c, d, a, x[i + 1], 21, -2054922799);
    a = md5ii(a, b, c, d, x[i + 8], 6, 1873313359);
    d = md5ii(d, a, b, c, x[i + 15], 10, -30611744);
    c = md5ii(c, d, a, b, x[i + 6], 15, -1560198380);
    b = md5ii(b, c, d, a, x[i + 13], 21, 1309151649);
    a = md5ii(a, b, c, d, x[i + 4], 6, -145523070);
    d = md5ii(d, a, b, c, x[i + 11], 10, -1120210379);
    c = md5ii(c, d, a, b, x[i + 2], 15, 718787259);
    b = md5ii(b, c, d, a, x[i + 9], 21, -343485551);
    
    a = safeAdd(a, olda);
    b = safeAdd(b, oldb);
    c = safeAdd(c, oldc);
    d = safeAdd(d, oldd);
  }
  
  function md5_W(s) {
    return ((s[0] | (s[1] << 8) | (s[2] << 16) | (s[3] << 24)) >>> 0).toString(16).padStart(8, '0');
  }
  
  return md5_W([a & 0xff, a >> 8 & 0xff, a >> 16 & 0xff, a >> 24 & 0xff]) +
         md5_W([b & 0xff, b >> 8 & 0xff, b >> 16 & 0xff, b >> 24 & 0xff]) +
         md5_W([c & 0xff, c >> 8 & 0xff, c >> 16 & 0xff, c >> 24 & 0xff]) +
         md5_W([d & 0xff, d >> 8 & 0xff, d >> 16 & 0xff, d >> 24 & 0xff]);
}

async function md5Array(data) {
  // Simple string conversion for array
  const str = new TextDecoder().decode(data);
  return { algo: 'MD5', hash: await md5String(str) };
}

function renderResults(hashes) {
  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = hashes.map(h => `
    <div class="result-item">
      <div class="algo">${h.algo}</div>
      <div class="hash" id="hash-${h.algo}">${h.hash}</div>
      <button class="copy" onclick="copyHash('${h.hash}')">📋</button>
    </div>
  `).join('');
}

function copyHash(hash) {
  navigator.clipboard.writeText(hash);
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

hashText();
</script>
</body>
</html>
